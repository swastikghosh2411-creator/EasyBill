<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="signup.css">
</head>
<body>
   <div class="head"><h1 style="color: black;">ACU</h1><h1 style="color: navy;">BILL</h1></div> 
    <p id="sig">Create your account</p>
<div class="main">
    <form class="mainbox">
        <label>Enter your name</label>
       <div class="name">
        
        <input type="text" placeholder="First Name" required>
        <input type="text" placeholder="Last Name" required>
       </div>
        <div class="ip"><label>Email address</label>
        <input type="email" placeholder="Enter your email" required>
        </div>
        <div class="ip"><label>Password</label>
        <input type="password" placeholder="Create your 8 digit password" required>
        </div>
        <button>Sign Up</button>
        <div class="create"><p>Already have an account?</p>
        <a href="signin.html"> Sign in</a>
        </div>
    </form>
</div>
</body>
</html>
